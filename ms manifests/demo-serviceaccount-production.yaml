apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-application
  namespace: production
  annotations:
    # IRSA: the IAM role must have a trust policy for the cluster OIDC provider,
    # scoped to system:serviceaccount:production:demo-application
    #
    # Required IAM permissions:
    #   xray:PutTraceSegments
    #   xray:PutTelemetryRecords
    #   xray:GetSamplingRules      (only for X-Ray remote sampling)
    #   xray:GetSamplingTargets    (only for X-Ray remote sampling)
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/xxxxxxxx
